# argocd-app.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: invoice
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:Hai-NgoTruong/argocdlab.git 
    targetRevision: HEAD
    path: .    # ← folder with your deployment.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
