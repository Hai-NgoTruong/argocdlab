<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoice Generator</title>
  <link rel="stylesheet" href="styles.css">
  <!-- Export libraries (CDN). jsPDF + autotable for PDF, docx for Word, FileSaver for downloads. -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/docx/8.5.0/docx.umd.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js" defer></script>
</head>
<body>
  <header class="topbar">
    <div class="wrap bar">
      <h1>Invoice Generator</h1>
      <div class="actions">
        <button id="exportPdf" type="button">Export PDF</button>
        <button id="exportWord" type="button">Export Word</button>
        <button id="clearAll" type="button" class="ghost">Clear</button>
        <span id="saveStatus" class="save-status" aria-live="polite"></span>
      </div>
    </div>
  </header>

  <main class="wrap layout">
    <!-- ============ FORM ============ -->
    <form id="invoiceForm" class="panel" autocomplete="off">
      <div class="grid2">
        <fieldset>
          <legend>From</legend>
          <label>Name / Company <input type="text" data-field="fromName" placeholder="Your Business"></label>
          <label>Address <textarea data-field="fromAddress" rows="3" placeholder="Street, City, ZIP"></textarea></label>
          <label>Email <input type="email" data-field="fromEmail" placeholder="you@example.com"></label>
        </fieldset>

        <fieldset>
          <legend>Bill To</legend>
          <label>Client <input type="text" data-field="toName" placeholder="Client Name"></label>
          <label>Address <textarea data-field="toAddress" rows="3" placeholder="Street, City, ZIP"></textarea></label>
          <label>Email <input type="email" data-field="toEmail" placeholder="client@example.com"></label>
        </fieldset>
      </div>

      <fieldset>
        <legend>Invoice details</legend>
        <div class="grid3">
          <label>Invoice # <input type="text" data-field="invoiceNumber" placeholder="INV-001"></label>
          <label>Date <input type="date" data-field="date"></label>
          <label>Due date <input type="date" data-field="dueDate"></label>
        </div>
      </fieldset>

      <fieldset>
        <legend>Line items</legend>
        <table class="items" id="itemsTable">
          <thead>
            <tr>
              <th class="desc">Description</th>
              <th class="num">Qty</th>
              <th class="num">Unit price</th>
              <th class="num">Amount</th>
              <th class="rm" aria-label="Remove"></th>
            </tr>
          </thead>
          <tbody id="itemsBody"></tbody>
        </table>
        <button type="button" id="addItem" class="ghost small">+ Add line item</button>
      </fieldset>

      <fieldset>
        <legend>Totals & notes</legend>
        <div class="grid2">
          <label>Tax rate (%) <input type="number" data-field="taxRate" min="0" step="0.01" value="0"></label>
          <label>Currency
            <select data-field="currency">
              <option value="$">USD ($)</option>
              <option value="£">GBP (£)</option>
              <option value="€">EUR (€)</option>
              <option value="¥">JPY (¥)</option>
            </select>
          </label>
        </div>
        <label>Notes <textarea data-field="notes" rows="2" placeholder="Payment terms, thank you, etc."></textarea></label>
      </fieldset>
    </form>

    <!-- ============ PREVIEW ============ -->
    <aside class="panel preview" id="preview" aria-label="Invoice preview"></aside>
  </main>

  <script src="export.js"></script>
  <script src="app.js"></script>
</body>
</html>
